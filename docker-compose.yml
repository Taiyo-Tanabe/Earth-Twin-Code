version: "3.9"

services:
  # ── Frontend ──────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_PROXY_TARGET: http://backend:8000

  # ── Backend API ───────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - earth_data:/app/data
    environment:
      TIMESCALE_URL: postgresql://earthtwin:earthtwin123@timescaledb:5432/earthtwin
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: earthtwin
      MINIO_SECRET_KEY: earthtwin123
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ACLED_EMAIL: ${ACLED_EMAIL:-}
      ACLED_PASSWORD: ${ACLED_PASSWORD:-}
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Collector (常時稼働・全データソース) ──────────────
  collector:
    build: ./backend
    command: python -m collectors.runner
    volumes:
      - ./backend:/app
      - earth_data:/app/data
    environment:
      TIMESCALE_URL: postgresql://earthtwin:earthtwin123@timescaledb:5432/earthtwin
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: earthtwin
      MINIO_SECRET_KEY: earthtwin123
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ACLED_EMAIL: ${ACLED_EMAIL:-}
      ACLED_PASSWORD: ${ACLED_PASSWORD:-}
    restart: always
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Stream Processor (Redis → TimescaleDB) ────────────
  stream-processor:
    build: ./backend
    command: python -m collectors.stream_processor
    volumes:
      - ./backend:/app
      - earth_data:/app/data
    environment:
      TIMESCALE_URL: postgresql://earthtwin:earthtwin123@timescaledb:5432/earthtwin
      REDIS_URL: redis://redis:6379
    restart: always
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Data Scout (常時稼働・6時間ごとに新ソース探索) ────
  data-scout:
    build: ./backend
    command: python -m agents.scout_runner
    volumes:
      - ./backend:/app
      - earth_data:/app/data
    environment:
      TIMESCALE_URL: postgresql://earthtwin:earthtwin123@timescaledb:5432/earthtwin
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    restart: always
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Redis (メッセージキュー) ───────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ── TimescaleDB ────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: earthtwin
      POSTGRES_PASSWORD: earthtwin123
      POSTGRES_DB: earthtwin
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U earthtwin"]
      interval: 5s
      retries: 10

  # ── MinIO (Data Lake) ─────────────────────────────────
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: earthtwin
      MINIO_ROOT_PASSWORD: earthtwin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # ── MLflow ────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --backend-store-uri postgresql://earthtwin:earthtwin123@timescaledb:5432/earthtwin
      --default-artifact-root s3://mlflow/
      --host 0.0.0.0
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: earthtwin
      AWS_SECRET_ACCESS_KEY: earthtwin123
    depends_on:
      timescaledb:
        condition: service_healthy

volumes:
  timescale_data:
  minio_data:
  earth_data:
