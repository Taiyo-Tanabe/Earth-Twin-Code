version: "3.9"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    # Airflow にない backend 依存パッケージのみ追加 (sqlalchemy/psycopg2/requests はAirflow同梱)
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      xgboost==2.0.3 scikit-learn==1.5.0 joblib==1.4.2
      pycountry==23.12.11 openpyxl==3.1.4 wbgapi==1.0.12
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: earthtwin
    MINIO_SECRET_KEY: earthtwin123
    TIMESCALE_URL: postgresql://earthtwin:earthtwin123@timescaledb:5432/earthtwin
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ACLED_EMAIL: ${ACLED_EMAIL:-}
    ACLED_PASSWORD: ${ACLED_PASSWORD:-}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./backend:/opt/airflow/backend
    - ./backend/data:/app/data  # backend と同じデータパスをAirflowでも使用
  depends_on:
    postgres-airflow:
      condition: service_healthy

services:
  # ── Frontend ──────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_PROXY_TARGET: http://backend:8000

  # ── Backend API ───────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
    environment:
      TIMESCALE_URL: postgresql://earthtwin:earthtwin123@timescaledb:5432/earthtwin
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: earthtwin
      MINIO_SECRET_KEY: earthtwin123
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ACLED_EMAIL: ${ACLED_EMAIL:-}
      ACLED_PASSWORD: ${ACLED_PASSWORD:-}
    depends_on:
      timescaledb:
        condition: service_healthy

  # ── TimescaleDB (時系列PostgreSQL) ────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: earthtwin
      POSTGRES_PASSWORD: earthtwin123
      POSTGRES_DB: earthtwin
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U earthtwin"]
      interval: 5s
      retries: 10

  # ── MinIO (Data Lake) ─────────────────────────────────
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: earthtwin
      MINIO_ROOT_PASSWORD: earthtwin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # ── MLflow (モデル管理) ───────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --backend-store-uri postgresql://earthtwin:earthtwin123@timescaledb:5432/earthtwin
      --default-artifact-root s3://mlflow/
      --host 0.0.0.0
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: earthtwin
      AWS_SECRET_ACCESS_KEY: earthtwin123
    depends_on:
      timescaledb:
        condition: service_healthy

  # ── Airflow Postgres (メタDB) ─────────────────────────
  postgres-airflow:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10

  # ── Airflow Init ──────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --firstname Admin --lastname User \
          --role Admin --email admin@earthtwin.local --password admin
    restart: "no"

  # ── Airflow Webserver ─────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow Scheduler ─────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  timescale_data:
  minio_data:
  airflow_pg_data:
